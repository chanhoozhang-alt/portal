# Nginx 全局事件配置
events {
    # 每个 worker 进程的最大并发连接数
    worker_connections 1024;
}

http {
    server {
        # 监听 80 端口，即浏览器访问 http://localhost 时的入口
        listen 80;

        # 匹配所有页面请求（JS、CSS、HTML 等）
        location / {
            # 转发给宿主机上的 Vite Dev Server（3000端口）
            # host.docker.internal 是 Docker 提供的特殊域名，指向宿主机（你的电脑）
            proxy_pass http://host.docker.internal:3000;

            # 透传客户端真实信息给 Vite，否则 Vite 拿到的是 Docker 容器的地址
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # --- Vite HMR（热更新）WebSocket 支持 ---
            # Vite 热更新通过 WebSocket 实现，需要以下配置让 Nginx 正确转发 WebSocket 连接
            # 不加这两行，浏览器页面无法自动刷新
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # 匹配所有 /api/ 开头的请求（如 /api/auth/login、/api/system/user/list）
        location /api/ {
            # 转发给宿主机上的网关服务（8080端口）
            # 这里就是和生产环境一致的 API 代理链路
            proxy_pass http://host.docker.internal:8080;

            # 透传客户端真实信息给网关，网关可能需要获取真实 IP 做鉴权或日志
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
