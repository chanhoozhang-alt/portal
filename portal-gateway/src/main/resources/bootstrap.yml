# ============================================================
# API 网关（portal-gateway）引导配置
# ============================================================

server:
  port: 8080 # 网关端口号，作为系统统一入口

spring:
  main:
    web-application-type: reactive # WebFlux 响应式应用类型（网关基于 Netty）
  application:
    name: portal-gateway # 服务名称，用于 Nacos 注册与路由寻址
  cloud:
    nacos:
      server-addr: ${NACOS_ADDR:localhost:8848} # Nacos 地址，可通过环境变量覆盖
      discovery:
        namespace: portal # 服务发现命名空间，用于环境隔离
        group: DEFAULT_GROUP # 服务发现分组
      config:
        namespace: portal # 配置中心命名空间，与发现保持一致
        file-extension: yaml # 配置文件格式
        shared-configs: # 共享配置列表，从 Nacos 拉取
          - data-id: common-redis.yaml # Redis 连接配置
            group: SHARED # 共享配置分组
            refresh: true # 支持动态刷新
          - data-id: common-satoken.yaml # Sa-Token 鉴权配置
            group: SHARED
            refresh: true
    gateway: # Spring Cloud Gateway 路由规则
      routes:
        - id: auth-service # 认证服务路由
          uri: lb://portal-auth # 负载均衡调用 portal-auth 服务
          predicates:
            - Path=/api/auth/** # 匹配 /api/auth/ 开头的请求
        - id: system-service # 系统管理服务路由
          uri: lb://portal-system # 负载均衡调用 portal-system 服务
          predicates:
            - Path=/api/system/** # 匹配 /api/system/ 开头的请求
        - id: business-service # 业务服务路由
          uri: lb://portal-business # 负载均衡调用 portal-business 服务
          predicates:
            - Path=/api/portal/**,/api/app/**,/api/category/** # 匹配多个业务路径前缀

logging:
  level:
    com.xxx.portal: debug # 项目日志级别
