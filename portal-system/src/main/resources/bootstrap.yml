# ============================================================
# 系统管理服务（portal-system）引导配置
# ============================================================

server:
  port: 9002 # 服务端口号

spring:
  application:
    name: portal-system # 服务名称，用于 Nacos 注册与路由寻址
  cloud:
    nacos:
      server-addr: ${NACOS_ADDR:localhost:8848} # Nacos 地址，可通过环境变量覆盖
      discovery:
        namespace: portal # 服务发现命名空间，用于环境隔离
        group: DEFAULT_GROUP # 服务发现分组
      config:
        namespace: portal # 配置中心命名空间，与发现保持一致
        file-extension: yaml # 配置文件格式
        shared-configs: # 共享配置列表，从 Nacos 拉取
          - data-id: common-mysql.yaml # MySQL 数据库连接配置
            group: SHARED # 共享配置分组
            refresh: true # 支持动态刷新
          - data-id: common-redis.yaml # Redis 连接配置
            group: SHARED
            refresh: true
          - data-id: common-satoken.yaml # Sa-Token 鉴权配置
            group: SHARED
            refresh: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true # 数据库下划线命名自动映射为驼峰命名
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl # SQL 日志输出到控制台
  global-config:
    db-config:
      logic-delete-field: deleted # 全局逻辑删除字段名

logging:
  level:
    com.xxx.portal: debug # 项目日志级别
